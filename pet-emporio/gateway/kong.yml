_format_version: "3.0"
_transform: true

# ─── Consumers ────────────────────────────────────────────────────────────────
# One shared consumer represents "any valid pet-emporio token".
# The jwt plugin validates the RS256 signature; our custom plugin extracts claims.

consumers:
  - username: pet-emporio-app
    jwt_secrets:
      - key: pet-emporio
        algorithm: RS256
        rsa_public_key: REPLACE_PUBLIC_KEY

# ─── Services ────────────────────────────────────────────────────────────────

services:
  - name: auth-service
    url: http://auth-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: user-service
    url: http://user-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: catalog-service
    url: http://catalog-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: order-service
    url: http://order-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: payment-service
    url: http://payment-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: booking-service
    url: http://booking-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: medical-service
    url: http://medical-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: notification-service
    url: http://notification-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: content-service
    url: http://content-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

  - name: report-service
    url: http://report-service:8000
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

# ─── Routes ──────────────────────────────────────────────────────────────────

routes:
  # Auth — public OTP routes (no JWT)
  - name: auth-otp-public
    service: auth-service
    paths:
      - ~/api/v1/auth/otp/.*
      - ~/api/v1/auth/token/refresh/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          limit_by: ip

  # Auth — all other auth routes (JWT required)
  - name: auth-protected
    service: auth-service
    paths:
      - ~/api/v1/auth/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          limit_by: ip

  # User service routes
  - name: user-service-routes
    service: user-service
    paths:
      - ~/api/v1/users/.*
      - ~/api/v1/tenants/.*
      - ~/api/v1/admin/users/.*
      - ~/api/v1/admin/tenants/.*
      - ~/api/v1/admin/kyc/.*
      - ~/api/v1/admin/roles/.*
      - ~/api/v1/admin/permissions/.*
      - ~/api/v1/admin/audit-logs/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Catalog — public read routes (no JWT)
  - name: catalog-public
    service: catalog-service
    paths:
      - /api/v1/categories
      - ~/api/v1/categories/.*
      - ~/api/v1/products$
      - ~/api/v1/products/[^/]+$
    methods: [GET, OPTIONS]
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip

  # Catalog — seller/admin routes (JWT required)
  - name: catalog-protected
    service: catalog-service
    paths:
      - ~/api/v1/catalog/.*
      - ~/api/v1/admin/products/.*
      - ~/api/v1/admin/categories/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Order service routes
  - name: order-service-routes
    service: order-service
    paths:
      - ~/api/v1/orders/.*
      - /api/v1/orders
      - ~/api/v1/cart/.*
      - /api/v1/cart
      - ~/api/v1/seller/orders/.*
      - /api/v1/seller/orders
      - ~/api/v1/admin/orders/.*
      - /api/v1/admin/orders
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Payment — webhook (no JWT — signed by BillDesk HMAC)
  - name: payment-webhook
    service: payment-service
    paths:
      - /api/v1/payments/webhook
    methods: [POST, OPTIONS]
    strip_path: false

  # Payment — all other payment routes
  - name: payment-protected
    service: payment-service
    paths:
      - ~/api/v1/payments/.*
      - /api/v1/payments
      - ~/api/v1/seller/payouts/.*
      - /api/v1/seller/payouts
      - ~/api/v1/admin/payouts/.*
      - /api/v1/admin/payouts
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Booking — public provider/slot listing
  - name: booking-public
    service: booking-service
    paths:
      - /api/v1/providers
      - ~/api/v1/providers/[^/]+/slots
      - /api/v1/camps
    methods: [GET, OPTIONS]
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip

  # Booking — protected routes
  - name: booking-protected
    service: booking-service
    paths:
      - ~/api/v1/bookings/.*
      - /api/v1/bookings
      - ~/api/v1/provider/bookings/.*
      - /api/v1/provider/bookings
      - ~/api/v1/provider/schedule/.*
      - /api/v1/provider/schedule
      - /api/v1/provider/time-off
      - ~/api/v1/admin/bookings/.*
      - /api/v1/admin/bookings
      - ~/api/v1/admin/camps/.*
      - /api/v1/admin/camps
      - ~/api/v1/slots/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Medical service routes
  - name: medical-service-routes
    service: medical-service
    paths:
      - ~/api/v1/pets/.*
      - /api/v1/pets
      - ~/api/v1/medical/.*
      - ~/api/v1/doctor/.*
      - ~/api/v1/lab/.*
      - ~/api/v1/pharmacy/.*
      - ~/api/v1/admin/pets/.*
      - /api/v1/admin/pets
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Notification service routes
  - name: notification-service-routes
    service: notification-service
    paths:
      - ~/api/v1/notifications/.*
      - /api/v1/notifications
      - ~/api/v1/admin/notifications/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Content — public routes
  - name: content-public
    service: content-service
    paths:
      - /api/v1/content/banners
      - /api/v1/content/faqs
      - ~/api/v1/content/pages/.*
      - ~/api/v1/reviews/[^/]+$
    methods: [GET, OPTIONS]
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip

  # Content — protected routes
  - name: content-protected
    service: content-service
    paths:
      - /api/v1/reviews
      - ~/api/v1/support/.*
      - ~/api/v1/media/.*
      - ~/api/v1/admin/content/.*
      - ~/api/v1/admin/reviews/.*
      - ~/api/v1/admin/support/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

  # Report service routes
  - name: report-service-routes
    service: report-service
    paths:
      - ~/api/v1/reports/.*
      - /api/v1/reports
      - ~/api/v1/admin/reports/.*
    methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          header_names: [authorization]
          key_claim_name: iss
      - name: jwt-claims-to-headers
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: consumer

# ─── Global Plugins ──────────────────────────────────────────────────────────

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
        - X-Request-Id
      exposed_headers:
        - X-Auth-Token
        - X-Request-Id
        - X-Gateway
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: request-id
    config:
      header_name: X-Request-Id
      echo_downstream: true

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Gateway:kong"
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"