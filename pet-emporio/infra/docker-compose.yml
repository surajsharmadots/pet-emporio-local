version: "3.9"

networks:
  pet-emporio-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  keycloak_data:

services:
  # Infrastructure 

  postgres:
    image: postgres:16
    container_name: pe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet-emporio-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pet-emporio-network

  redis:
    image: redis:7-alpine
    container_name: pe-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet-emporio-network

  minio:
    image: minio/minio
    container_name: pe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - pet-emporio-network

  mailhog:
    image: mailhog/mailhog
    container_name: pe-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pet-emporio-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: pe-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - pet-emporio-network

  keycloak:
    image: keycloak/keycloak:24.0
    container_name: pe-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pe_keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_FEATURES: token-exchange,admin-fine-grained-authz
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - pet-emporio-network

  kong:
    image: kong/kong:3.7
    container_name: pe-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8002 ssl"
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: "bundled,jwt-claims-to-headers"
      KONG_LUA_PACKAGE_PATH: "/etc/kong/plugins/?.lua;;"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8002:8002"
    volumes:
      - ../gateway/kong.yml:/etc/kong/kong.yml:ro
      - ../gateway/plugins/jwt-claims-to-headers:/usr/local/share/lua/5.1/kong/plugins/jwt-claims-to-headers:ro
    depends_on:
      - auth-service
    networks:
      - pet-emporio-network

  # Microservices

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: pe-auth-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_auth
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-pet-emporio}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-service}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-auth-service-secret}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - pet-emporio-network

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    container_name: pe-user-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_users
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8012:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile
    container_name: pe-catalog-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: catalog-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_catalog
      REDIS_URL: redis://redis:6379/2
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8013:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  order-service:
    build:
      context: ../services/order-service
      dockerfile: Dockerfile
    container_name: pe-order-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: order-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_orders
      REDIS_URL: redis://redis:6379/3
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      CATALOG_SERVICE_URL: http://catalog-service:8000
      USER_SERVICE_URL: http://user-service:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8014:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    container_name: pe-payment-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: payment-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_payments
      REDIS_URL: redis://redis:6379/4
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      BILLDESK_MERCHANT_ID: ${BILLDESK_MERCHANT_ID:-dev_merchant}
      BILLDESK_SECRET_KEY: ${BILLDESK_SECRET_KEY:-dev_secret}
      BILLDESK_BASE_URL: ${BILLDESK_BASE_URL:-https://uat.billdesk.com}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8015:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  booking-service:
    build:
      context: ../services/booking-service
      dockerfile: Dockerfile
    container_name: pe-booking-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: booking-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_bookings
      REDIS_URL: redis://redis:6379/5
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8016:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  medical-service:
    build:
      context: ../services/medical-service
      dockerfile: Dockerfile
    container_name: pe-medical-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: medical-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_medical
      REDIS_URL: redis://redis:6379/6
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JITSI_APP_ID: ${JITSI_APP_ID:-pet-emporio}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET:-dev_secret}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8017:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: pe-notification-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: notification-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_notifications
      REDIS_URL: redis://redis:6379/7
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USE_TLS: "false"
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-dev_key}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-dev_key}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8018:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  content-service:
    build:
      context: ../services/content-service
      dockerfile: Dockerfile
    container_name: pe-content-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: content-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_content
      REDIS_URL: redis://redis:6379/8
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8019:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network

  report-service:
    build:
      context: ../services/report-service
      dockerfile: Dockerfile
    container_name: pe-report-service
    restart: unless-stopped
    environment:
      SERVICE_NAME: report-service
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pe_reports
      REDIS_URL: redis://redis:6379/9
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8020:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pet-emporio-network